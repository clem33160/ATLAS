sources:
  - id: demo_public_signals
    nom: Signaux publics de démonstration
    type: public_notice
    base_url: https://example.local/demo
    country: FR
    language: fr
    domains: [example.local]
    mode_collecte: manual_only
    enabled: true
    respect_tos_required: true
    robots_policy_note: Démo locale.
    legal_notes: Données EXAMPLE/DEMO.
    allowed_collection: one_url_at_a_time
    forbidden: [captcha_bypass, login_bypass, mass_scraping, auto_contact, spam]
  - id: user_provided_url
    nom: URL publiques fournies manuellement
    type: user_provided_url
    base_url: https://manual.local
    country: FR
    language: fr
    domains: []
    mode_collecte: semi_auto_url_only
    enabled: true
    respect_tos_required: true
    robots_policy_note: Validation humaine des conditions du site requise.
    legal_notes: Une requête GET max par URL fournie.
    allowed_collection: one_url_at_a_time
    forbidden: [captcha_bypass, login_bypass, mass_scraping, auto_contact, spam]
  - id: generic_public_directory
    nom: Annuaire public générique
    type: public_directory
    base_url: https://example.org
    country: FR
    language: fr
    domains: [example.org]
    mode_collecte: disabled
    enabled: false
    respect_tos_required: true
    robots_policy_note: Validation humaine des conditions du site requise.
    legal_notes: Profil désactivé par défaut.
    allowed_collection: one_url_at_a_time
    forbidden: [captcha_bypass, login_bypass, mass_scraping, auto_contact, spam]
